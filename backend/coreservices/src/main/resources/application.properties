spring.application.name=coreservices

#Server Port (0 = random available port)
# Set to fixed port for local development
server.port=8080

#PostgreSQL Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/sdcproject
spring.datasource.username=postgres
spring.datasource.password=Mohit@2704

#JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (base64-encoded 256-bit key). If not set, a random key is generated on startup.
# Generate one with: openssl rand -base64 32
jwt.secret=
